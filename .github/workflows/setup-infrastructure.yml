name: Setup Infrastructure

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  setup:
    name: Create D1 + R2 + apply schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Authenticate Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: whoami  # no-op, just authenticates

      - name: Create D1 database (skips if already exists)
        run: npx wrangler d1 create wemapstyle || echo "D1 database already exists, skipping"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 schema
        run: npx wrangler d1 execute wemapstyle --file=schema.d1.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Create R2 bucket (skips if already exists)
        run: npx wrangler r2 bucket create wemapstyle-fonts || echo "R2 bucket already exists, skipping"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Times New Roman fonts to R2
        run: |
          for f in server/fonts/Times\ New\ Roman\ Regular/*.pbf; do
            filename=$(basename "$f")
            npx wrangler r2 object put "wemapstyle-fonts/Times New Roman Regular/$filename" \
              --file="$f" --remote
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
