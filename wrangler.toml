name = "wemapstyle-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wemapstyle"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "FONTS_BUCKET"
bucket_name = "wemapstyle-fonts"

[vars]
# Non-secret vars go here
# ANTHROPIC_API_KEY must be set via: wrangler secret put ANTHROPIC_API_KEY

[dev]
port = 3001
