name = "wemapstyle-api"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "wemapstyle"
database_id = "12f2e8bd-b061-48d6-b3f9-bab51d459fa8"

[[r2_buckets]]
binding = "FONTS_BUCKET"
bucket_name = "wemapstyle-fonts"

[vars]
# Non-secret vars go here
# Secrets are injected automatically on deploy via GitHub Actions:
# ANTHROPIC_API_KEY, WEMAP_CLIENT_ID, WEMAP_CLIENT_SECRET
# Add them as repository secrets in GitHub → Settings → Secrets and variables → Actions

[dev]
port = 3001
